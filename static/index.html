<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Sales Query Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8e8; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .chat-window { width: 700px; height: 80vh; max-height: 700px; background: #f5f5f5; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #1a1a2e; color: white; padding: 14px 20px; border-radius: 16px 16px 0 0; }
        .header h1 { font-size: 16px; font-weight: 600; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .message.user .bubble { background: #1a1a2e; color: white; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; white-space: normal; }
        .message.assistant .bubble p { margin: 0 0 8px 0; } .message.assistant .bubble p:last-child { margin-bottom: 0; }
        .message.assistant .bubble ul, .message.assistant .bubble ol { margin: 4px 0 8px 20px; }
        .message.assistant .bubble li { margin-bottom: 2px; }
        .message.assistant .bubble strong { font-weight: 600; }
        .message.assistant .bubble code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-size: 13px; }
        .message.assistant .bubble pre { background: #f0f0f0; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .message.assistant .bubble pre code { background: none; padding: 0; }
        .message.assistant .bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .message.assistant .bubble th, .message.assistant .bubble td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
        .message.assistant .bubble th { background: #f5f5f5; font-weight: 600; }
        .input-area { border-top: 1px solid #e0e0e0; background: white; padding: 14px 20px; border-radius: 0 0 16px 16px; }
        .input-wrapper { display: flex; gap: 10px; }
        .input-wrapper input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .input-wrapper input:focus { border-color: #1a1a2e; }
        .input-wrapper button { padding: 12px 24px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .input-wrapper button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: inline-block; } .loading::after { content: '...'; animation: dots 1s steps(3, end) infinite; } @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body>
    <div class="chat-window">
        <div class="header"><h1>Vehicle Sales Query Agent</h1></div>
        <div class="chat-container" id="chat"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="input" placeholder="Ask about vehicle sales..." autofocus>
                <button id="send" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const sessionId = crypto.randomUUID();
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (role === 'assistant') {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            div.appendChild(bubble);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';
            sendBtn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'message assistant';
            loading.innerHTML = '<div class="bubble"><span class="loading">Thinking</span></div>';
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId, message: msg})
                });
                const data = await res.json();
                loading.remove();
                addMessage(data.response || data.detail || 'Error', 'assistant');
            } catch (e) {
                loading.remove();
                addMessage('Connection error. Is the server running?', 'assistant');
            }
            sendBtn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
