<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Sales Query Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a2e; color: white; padding: 16px 24px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; max-width: 800px; width: 100%; margin: 0 auto; }
        .message { margin-bottom: 16px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .message.user .bubble { background: #1a1a2e; color: white; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .input-area { border-top: 1px solid #e0e0e0; background: white; padding: 16px 24px; }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; }
        .input-wrapper input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .input-wrapper input:focus { border-color: #1a1a2e; }
        .input-wrapper button { padding: 12px 24px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .input-wrapper button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: inline-block; } .loading::after { content: '...'; animation: dots 1s steps(3, end) infinite; } @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body>
    <div class="header"><h1>Vehicle Sales Query Agent</h1></div>
    <div class="chat-container" id="chat"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="input" placeholder="Ask about vehicle sales..." autofocus>
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        const sessionId = crypto.randomUUID();
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            div.appendChild(bubble);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';
            sendBtn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'message assistant';
            loading.innerHTML = '<div class="bubble"><span class="loading">Thinking</span></div>';
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId, message: msg})
                });
                const data = await res.json();
                loading.remove();
                addMessage(data.response || data.detail || 'Error', 'assistant');
            } catch (e) {
                loading.remove();
                addMessage('Connection error. Is the server running?', 'assistant');
            }
            sendBtn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
